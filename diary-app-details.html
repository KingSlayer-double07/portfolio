<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentimental Diary Application</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="animation.css" />
</head>

<body class="font-poppins bg-gray-900 text-white">
    <project-details-navbar></project-details-navbar>

    <div id="vanta-bg" class="fixed inset-0 -z-10"></div>

    <main class="mx-auto max-w-screen-xl px-4 sm:px-6 lg:px-8 py-12 sm:py-16 lg:py-20">
        <section id="header">

            <div class="project-card tilt reveal" data-reveal="up" data-delay="50">
                <div class="project-content">
                    <h3 class="text-lg sm:text-xl font-semibold">SyncShed</h3>
                    <p class="text-sm sm:text-base text-gray-300">
                        A personalized mobile application designed as a digital
                        sanctuary for memories and reflections, built specially for a loved one.
                    </p>
                    <div class="project-tags flex flex-wrap gap-2 mt-2">
                        <span class="bg-gray-800 px-2 py-1 rounded text-sm">React Native</span>
                        <span class="bg-gray-800 px-2 py-1 rounded text-sm">Expo</span>
                        <span class="bg-gray-800 px-2 py-1 rounded text-sm">TypeScript</span>
                        <span class="bg-gray-800 px-2 py-1 rounded text-sm">AsyncStorage</span>
                        <span class="bg-gray-800 px-2 py-1 rounded text-sm">Reanimated</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Screenshots Section-->
        <section id="screenshots" class="mt-8">
            <h2 class="text-2xl sm:text-3xl font-semibold mb-4 mt-8">Screenshots</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div
                    class="rounded-lg overflow-hidden bg-gray-800 border border-gray-700 shadow-lg hover:shadow-xl transition-shadow">
                    <img src="assets/screenshots/diary01.png" alt="App screenshot 1" class="w-full h-auto object-cover">
                </div>
                <div
                    class="rounded-lg overflow-hidden bg-gray-800 border border-gray-700 shadow-lg hover:shadow-xl transition-shadow">
                    <img src="assets/screenshots/diary02.png" alt="App screenshot 2" class="w-full h-auto object-cover">
                </div>
                <div
                    class="rounded-lg overflow-hidden bg-gray-800 border border-gray-700 shadow-lg hover:shadow-xl transition-shadow">
                    <img src="assets/screenshots/diary03.png" alt="App screenshot 3" class="w-full h-auto object-cover">
                </div>
                <div
                    class="rounded-lg overflow-hidden bg-gray-800 border border-gray-700 shadow-lg hover:shadow-xl transition-shadow">
                    <img src="assets/screenshots/diary04.png" alt="App screenshot 4" class="w-full h-auto object-cover">
                </div>
                <div
                    class="rounded-lg overflow-hidden bg-gray-800 border border-gray-700 shadow-lg hover:shadow-xl transition-shadow">
                    <img src="assets/screenshots/diary05.png" alt="App screenshot 5" class="w-full h-auto object-cover">
                </div>
            </div>
        </section>
    </main>

    <custom-footer></custom-footer>

    <script src="components/project-details-navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="script.js"></script>

    <script src="animation.js" defer></script>

    <script>
        feather.replace()
        VANTA.NET({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.0,
            minWidth: 200.0,
            scale: 1.0,
            scaleMobile: 1.0,
            color: 0x7e22ce,
            backgroundColor: 0x111827,
            points: 12.0,
            maxDistance: 22.0,
            spacing: 18.0,
        })
    </script>
</body>

</html>
